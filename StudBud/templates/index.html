<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBud - Your Ultimate Study Buddy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 290px;
            background: #111111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .logo-text h2 { font-size: 24px; font-weight: 700; }
        .logo-text p { font-size: 13px; color: #aaa; margin-top: -4px; }

        .new-chat {
            background: #1f1f1f;
            color: white;
            border: 1px solid #333;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .new-chat:hover {
            background: #2a2a2a;
            border-color: #667eea;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 24px 0 10px;
        }

        .kb-info {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.5;
        }
        .kb-info strong { color: #667eea; }

        /* Main Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 18px 30px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
        }
        .badge {
            background: #1f1f1f;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid #444;
            color: #aaa;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #0a0a0a;
        }

        .message {
            display: flex;
            gap: 14px;
            max-width: 78%;
            animation: fadeIn 0.3s ease;
        }
        .message.user { margin-left: auto; flex-direction: row-reverse; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            overflow: hidden;
        }
        .message.bot .avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .message.user .avatar { background: #333; }

        .bubble {
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.55;
            font-size: 15.5px;
        }
        .message.bot .bubble {
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 20px 20px 20px 6px;
        }
        .message.user .bubble {
            background: #667eea;
            border-radius: 20px 20px 6px 20px;
        }

        .welcome {
            text-align: center;
            margin: 80px auto;
            max-width: 520px;
        }
        .welcome h2 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        .suggestion {
            background: #1f1f1f;
            border: 1px solid #333;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14.5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .suggestion:hover {
            border-color: #667eea;
            background: #2a2a2a;
            transform: translateY(-2px);
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            border-top: 1px solid #222;
            background: #111;
        }
        .input-box {
            max-width: 820px;
            margin: 0 auto;
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 12px 8px;
        }
        button.send {
            background: #667eea;
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button.send:hover { background: #764ba2; transform: scale(1.08); }

        .upload-btn {
            background: #2a2a2a;
            border: 1px solid #555;
            color: #ccc;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
        }

        .typing {
            display: flex;
            gap: 4px;
        }
        .typing span {
            height: 5px;
            width: 5px;
            background: #aaa;
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">
                <img src="https://images.stockcake.com/public/5/3/a/53ae6691-222d-4906-b121-d4d91288bdfe_large/robot-studies-future-stockcake.jpg" alt="StudBud" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
            </div>
            <div class="logo-text">
                <h2>StudBud</h2>
                <p>Your Ultimate Study Buddy</p>
            </div>
        </div>

        <button class="new-chat" onclick="newConversation()">+ New Conversation</button>

        <div class="section-title">WHAT CAN STUDBUD DO?</div>
        <div class="kb-info">
            <strong>Can Make Studying Enjoyable!</strong>
            <br><br>
            • Make Tests and Quick Exams!<br>
            • Can be your Teacher and Buddy!<br>
            • Can Help you to get that A+ !<br>
            <hr style="border-color:#333; margin:12px 0;">
            <small>If you cant love the thing , Change the prespective</small>
            <br>
            - Haitham-
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="header">
            <h3>StudBud</h3>
            <span class="badge">Powered by Love and success</span>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-box">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="Upload PDF / PPTX / TXT">📎</button>
                <input type="file" id="fileInput" style="display:none" accept=".pdf,.pptx,.txt" onchange="uploadFile()">

                <input type="text" id="userInput" placeholder="Ask me anything... or upload your lecture notes!"
                       onkeypress="if(event.key==='Enter') sendMessage()">

                <button class="send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        let isTyping = false;

        // تحميل الشات السابق عند فتح الصفحة
        async function loadChatHistory() {
            try {
                const res = await fetch(`/api/history?userId=${userId}`);
                const data = await res.json();

                const container = document.getElementById('chatContainer');
                container.innerHTML = '';

                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                } else {
                    showWelcomeScreen();
                }
            } catch (err) {
                showWelcomeScreen();
            }
        }

        function showWelcomeScreen() {
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome">
                    <h2>Hey there</h2>
                    <p>I'm StudBud — your personal APU study buddy.<br>
                    I remember everything from your notes and make learning actually fun.</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="sendSuggestion('What subjects do we have?')">What subjects do we have?</div>
                        <div class="suggestion" onclick="sendSuggestion('Do we have AI?')">Do we have AI?</div>
                        <div class="suggestion" onclick="sendSuggestion('Explain Semantic Network')">Explain Semantic Network</div>
                        <div class="suggestion" onclick="sendSuggestion('Give me a quiz on Frames')">Give me a quiz on Frames</div>
                        <div class="suggestion" onclick="sendSuggestion('Explain Production Rules')">Explain Production Rules</div>
                    </div>
                </div>`;
        }

        function newConversation() {
            if (confirm("Start a new conversation? Previous chat will still be saved.")) {
                document.getElementById('chatContainer').innerHTML = '';
                showWelcomeScreen();
            }
        }

        function sendSuggestion(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isTyping) return;

            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            addMessage(message, 'user');
            input.value = '';
            isTyping = true;
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, userId: userId })
                });
                const data = await res.json();
                removeTyping();
                addMessage(data.reply || "Sorry, something went wrong bro.", 'bot');
            } catch (err) {
                removeTyping();
                addMessage("Can't connect to StudBud right now. Make sure the server is running!", 'bot');
            }
            isTyping = false;
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            const avatarHTML = sender === 'bot'
                ? `<img src="https://images.stockcake.com/public/5/3/a/53ae6691-222d-4906-b121-d4d91288bdfe_large/robot-studies-future-stockcake.jpg" alt="StudBud" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`
                : '👤';

            div.innerHTML = `
                <div class="avatar">${avatarHTML}</div>
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.className = 'message bot';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="avatar">
                    <img src="https://images.stockcake.com/public/5/3/a/53ae6691-222d-4906-b121-d4d91288bdfe_large/robot-studies-future-stockcake.jpg" alt="StudBud" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
                </div>
                <div class="bubble">
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>`;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            addMessage(`Uploading <strong>${file.name}</strong>...`, 'user');

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                addMessage(data.message || 'File added to my brain!', 'bot');
            } catch (err) {
                addMessage('Upload failed. Is StudBud running?', 'bot');
            }
            fileInput.value = '';
        }

        // تحميل الشات عند فتح الصفحة
        window.onload = () => {
            loadChatHistory();
        };
    </script>
</body>
</html>
